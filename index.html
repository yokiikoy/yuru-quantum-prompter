<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuchi-Draft — スライド／プロンプター</title>
    
    <!-- Google Fonts: Zen Maru Gothic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MathJax for LaTeX rendering -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root {
            --accent-color: #8fd3f4;
            --marker-color: #ffe066;
            --bubble-shadow: 4px 4px 0px var(--accent-color);
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #f0f7f4;
        }
        .prompter-container::-webkit-scrollbar {
            width: 10px;
        }
        .prompter-container::-webkit-scrollbar-thumb {
            background-color: #1e293b;
            border-radius: 5px;
        }

        /* スライドエリア: 白地基調へ変更可能に */
        .slide-area {
            background-color: #ffffff;
            background-image: radial-gradient(#f0f0f0 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        /* 共通: タイトルのマーカー装飾 (変数対応) */
        #slide-title {
            position: relative;
            display: inline-block;
            z-index: 1;
        }
        #slide-title::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: -8px;
            right: -8px;
            height: 14px;
            background-color: var(--marker-color);
            z-index: -1;
            border-radius: 8px;
            opacity: 0.7;
        }

        /* 画像コンテナ: 線画スタイルを活かすため装飾を最小化 */
        .img-placeholder {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        /* モバイル対応：全体的な文字サイズとレイアウトの微調整 */
        @media (max-width: 768px) {
            #slide-title { font-size: 1.25rem !important; margin-bottom: 0.5rem !important; min-height: auto !important; }
            #slide-content { padding-left: 0.5rem !important; padding-right: 0.5rem !important; }
            .bubble { padding: 12px !important; margin: 8px 0 !important; border-width: 2px !important; border-radius: 12px !important; }
            #slide-content p { font-size: 1rem !important; line-height: 1.6 !important; }
            #slide-content strong { font-size: 1.1rem !important; }
            /* ページ内の特定クラスの強制上書き */
            .text-5xl { font-size: 1.75rem !important; }
            .text-3xl { font-size: 1.25rem !important; }
            .text-2xl { font-size: 1.1rem !important; }
            .text-xl { font-size: 1rem !important; }
            .text-lg { font-size: 0.9rem !important; }
        }

        /* 共通: バブル (変数対応) */
        .bubble {
            background-color: #fff;
            border: 3px solid #4a4a4a;
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--bubble-shadow);
            margin: 16px 0;
            transition: box-shadow 0.3s ease;
        }
        .bubble-accent { box-shadow: 4px 4px 0px var(--accent-color); }
        .bubble-pink { box-shadow: 4px 4px 0px #ff9fb2; }
        .bubble-yellow { box-shadow: 4px 4px 0px #ffe066; }
        .caption {
            text-align: center;
            font-size: 14px;
            color: #7a7a7a;
            margin-top: 8px;
            font-weight: 700;
        }
        
        /* モバイル対応：バブル内の文字サイズ調整とプロンプターの改善 */
        @media (max-width: 768px) {
            #slide-title { font-size: 1.25rem !important; height: auto !important; margin-bottom: 8px !important; }
            #slide-content .bubble { padding: 8px 12px !important; margin: 6px 0 !important; }
            #slide-content .text-5xl { font-size: 1.5rem !important; line-height: 1.2 !important; }
            #slide-content .text-4xl { font-size: 1.3rem !important; }
            #slide-content .text-3xl { font-size: 1.2rem !important; }
            #slide-content .text-2xl { font-size: 1.1rem !important; }
            #slide-content .text-xl { font-size: 1rem !important; line-height: 1.4 !important; }
            #slide-content .text-lg { font-size: 0.85rem !important; line-height: 1.3 !important; }
            #slide-content p { font-size: 0.9rem !important; margin-bottom: 4px !important; }
            #slide-content .bubble-pink p, #slide-content .bubble-yellow p { font-size: 0.95rem !important; }
            
            /* プロンプター内のヘッダー調整 */
            #prompter-box h1 { font-size: 1.25rem !important; margin-top: 1rem !important; }
            #prompter-box h2 { font-size: 1.15rem !important; margin-top: 0.8rem !important; }
            #prompter-box h3 { font-size: 1.05rem !important; margin-top: 0.6rem !important; }
            #prompter-box p { font-size: 1.1rem !important; padding-right: 3.5rem !important; } /* ボタン回避用余白 */
            
            /* 強制非表示設定 */
            .mobile-hidden { display: none !important; }
        }

        /* [NEW] 溢れ防止のための強制設定 */
        #slide-content {
            overflow-y: hidden !important; 
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <!-- Top Navigation & Episode Selector -->
    <div class="flex-none bg-slate-900 px-4 md:px-6 py-2 flex justify-between items-center text-white shadow-lg z-50">
        <div class="flex items-center gap-2 md:gap-4 overflow-hidden">
            <span id="series-logo" class="mobile-hidden md:inline font-black tracking-widest text-lg shrink-0 transition-all duration-500" style="color: var(--accent-color);">ゆる量子力学ラジオ</span>
            <select id="episode-list" class="bg-slate-800 border border-slate-700 rounded-md px-2 md:px-3 py-1 text-xs md:text-sm text-blue-100 outline-none focus:ring-2 focus:ring-blue-500 max-w-[200px] md:max-w-none">
                <option value="">プロジェクトを選択中...</option>
            </select>
        </div>
        <div id="slide-counter" class="text-slate-400 font-bold text-xs md:text-sm tracking-tighter shrink-0">0 / 0</div>
    </div>

    <!-- Progress Bar -->
    <div class="flex-none w-full bg-gray-200 h-1">
        <div id="progress-bar" class="bg-blue-500 h-1 transition-all duration-300 w-0"></div>
    </div>
    
    <!-- Slide View Area (60% height) -->
    <div class="slide-area flex-[60] min-h-0 w-full flex justify-center items-start pt-4 px-4 md:pt-10 md:px-8 pb-4 md:pb-8 shadow-sm border-b-2 border-gray-100 overflow-hidden bg-white/50 backdrop-blur-sm">
        <div class="w-full max-w-6xl h-full flex flex-col justify-start items-center relative">
            
            <h1 id="slide-title" class="text-xl md:text-3xl font-bold mb-2 md:mb-8 text-gray-700 text-left w-full pb-2 md:pb-4 shrink-0 flex items-center border-b border-gray-100">
                タイトル
            </h1>
            
            <div class="flex flex-col md:flex-row w-full flex-1 min-h-0 justify-between items-stretch gap-4 md:gap-12 overflow-hidden">
                <div id="slide-content" class="w-full md:w-3/5 flex flex-col justify-center text-lg md:text-3xl leading-relaxed font-medium px-0 md:px-6 text-gray-700 overflow-y-auto">
                    <!-- 内容がここに挿入されます -->
                </div>
                <div class="img-placeholder w-full md:w-2/5 flex flex-col justify-center items-center p-0 relative group shrink-0 min-h-0">
                    <img id="slide-img" src="" class="hidden max-w-full max-h-[150px] md:max-h-full object-contain mx-auto" style="filter: multiply; mix-blend-mode: multiply;" />
                    <p id="slide-img-desc" class="text-gray-400 text-xs md:text-base whitespace-pre-wrap text-center italic leading-relaxed py-2">
                        [画像指示文]
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Prompter View Area (40% height) -->
    <div class="flex-[40] min-h-0 w-full bg-slate-900 flex justify-center py-4 px-6 md:py-6 md:px-10 relative overflow-hidden">
        <div class="absolute top-1 left-4 md:top-2 md:left-6 text-blue-400 font-bold text-[8px] md:text-[10px] tracking-[0.3em] opacity-40 uppercase">Voice Over Script / 語り用台本</div>
        <div id="prompter-box" class="prompter-container w-full max-w-5xl h-full overflow-y-auto px-2 md:px-4 pb-12 md:pb-16 pt-2 md:pt-4">
            <p id="slide-script" class="text-white text-base md:text-2xl leading-loose font-medium tracking-wide">
                <!-- 原稿がここに挿入されます -->
            </p>
        </div>
        <!-- 浮遊ナビゲーションボタン（スマホ用） -->
        <div class="fixed bottom-6 right-4 flex gap-3 z-[100] md:hidden">
            <button onclick="prevSlide()" class="w-12 h-12 rounded-full bg-slate-800/90 border border-slate-600 text-white text-xl flex items-center justify-center shadow-2xl active:scale-95 backdrop-blur-md">←</button>
            <button onclick="nextSlide()" class="w-12 h-12 rounded-full bg-blue-600/90 border border-blue-400 text-white text-xl flex items-center justify-center shadow-2xl active:scale-95 backdrop-blur-md">→</button>
        </div>
    </div>

    <!-- データ管理レイヤー (ローカルCORS制限回避) -->
    <script src="./episodes_list.js"></script>
    
    <!-- Application Logic -->
    <script>
        let currentSlide = 0;
        let currentPath = "";

        const elTitle = document.getElementById('slide-title');
        const elContent = document.getElementById('slide-content');
        const elImgDesc = document.getElementById('slide-img-desc');
        const elImg = document.getElementById('slide-img');
        const elScript = document.getElementById('slide-script');
        const elCounter = document.getElementById('slide-counter');
        const elProgress = document.getElementById('progress-bar');
        const elPrompterBox = document.getElementById('prompter-box');
        const elEpisodeList = document.getElementById('episode-list');

        const elSeriesLogo = document.getElementById('series-logo');

        /** URL クエリ ?series=<seriesId>&episode=<ep.id> で初期シリーズ・エピソードを指定（episodes_list.js の seriesId / id と一致） */
        function parseSeriesFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return {
                seriesId: params.get('series'),
                episodeId: params.get('episode')
            };
        }

        function findProjectBySeriesId(seriesId) {
            if (!seriesId || typeof projectsData === 'undefined') return null;
            return projectsData.find(pj => pj.seriesId === seriesId) || null;
        }

        /** クエリと projectsData から表示するプロジェクト・エピソードを決定（無効な series は先頭シリーズへフォールバック） */
        function resolveInitialSelection() {
            const { seriesId, episodeId } = parseSeriesFromUrl();
            let project = findProjectBySeriesId(seriesId);
            let usedFallbackSeries = false;

            if (!project && !seriesId && episodeId) {
                for (const pj of projectsData) {
                    const ep = pj.episodes && pj.episodes.find(e => e.id === episodeId);
                    if (ep) {
                        project = pj;
                        break;
                    }
                }
            }

            if (!project && projectsData.length > 0) {
                project = projectsData[0];
                usedFallbackSeries = !!seriesId;
            }
            if (!project || !project.episodes || project.episodes.length === 0) {
                return { project: null, episode: null, usedFallbackSeries };
            }
            let episode = episodeId
                ? project.episodes.find(ep => ep.id === episodeId)
                : null;
            if (!episode) episode = project.episodes[0];
            return { project, episode, usedFallbackSeries };
        }

        function selectionValue(seriesId, path) {
            return `${seriesId}|${path}`;
        }

        /** ドロップダウン変更後に URL を同期（リロードなし） */
        function syncUrlQueryFromSelection(seriesId, path) {
            const project = findProjectBySeriesId(seriesId);
            const ep = project && project.episodes
                ? project.episodes.find(e => e.path === path)
                : null;
            const url = new URL(window.location.href);
            url.searchParams.set('series', seriesId);
            if (ep && ep.id) url.searchParams.set('episode', ep.id);
            else url.searchParams.delete('episode');
            const next = url.pathname + url.search + url.hash;
            if (next !== window.location.pathname + window.location.search + window.location.hash) {
                history.replaceState(null, '', next);
            }
        }

        // Initializer for multi-project list
        function initEpisodeList() {
            if (typeof projectsData === 'undefined') {
                console.error("projectsData not found. Make sure episodes_list.js is loaded.");
                elEpisodeList.innerHTML = '<option value="">データ読み込み失敗</option>';
                return;
            }
            
            let html = '';
            projectsData.forEach(pj => {
                html += `<optgroup label="${pj.seriesTitle}">`;
                pj.episodes.forEach(ep => {
                    html += `<option value="${selectionValue(pj.seriesId, ep.path)}">${ep.title}</option>`;
                });
                html += `</optgroup>`;
            });
            elEpisodeList.innerHTML = html;
            
            const urlSel = parseSeriesFromUrl();
            const hadUrlSelection = !!(urlSel.seriesId || urlSel.episodeId);

            const { project, episode, usedFallbackSeries } = resolveInitialSelection();
            if (project && episode) {
                if (usedFallbackSeries) {
                    console.warn('URL の series が不明なため、先頭シリーズを表示しました:', urlSel.seriesId);
                }
                const value = selectionValue(project.seriesId, episode.path);
                elEpisodeList.value = value;
                updateSeriesStyle(project);
                changeEpisode(value, { skipUrlSync: true });
                if (hadUrlSelection) {
                    syncUrlQueryFromSelection(project.seriesId, episode.path);
                }
            }
        }

        function updateSeriesStyle(project) {
            // Update Accent Color
            document.documentElement.style.setProperty('--accent-color', project.accentColor || '#8fd3f4');
            elSeriesLogo.innerText = project.seriesTitle;
            
            // Optional: Beyond 2.0 specific styling
            if (project.seriesId === 'beyond') {
                document.documentElement.style.setProperty('--marker-color', '#93c5fd'); // Softer blue marker
                document.body.style.backgroundColor = "#f8fafc"; // White/Grey-ish
            } else {
                document.documentElement.style.setProperty('--marker-color', '#ffe066');
                document.body.style.backgroundColor = "#f0f7f4";
            }
        }

        function changeEpisode(value, opts) {
            const skipUrlSync = opts && opts.skipUrlSync;
            const [seriesId, path] = value.split('|');
            const project = projectsData.find(pj => pj.seriesId === seriesId);
            
            if (project) {
                updateSeriesStyle(project);
            }
            
            currentPath = path;
            currentSlide = 0;
            
            // Cleanup and Load new slides.js
            const oldScript = document.getElementById('slides-data-script');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'slides-data-script';
            script.src = path + 'slides.js?' + new Date().getTime();
            script.onload = () => {
                renderSlide();
            };
            document.body.appendChild(script);

            if (!skipUrlSync) {
                syncUrlQueryFromSelection(seriesId, path);
            }
        }

        elEpisodeList.onchange = (e) => changeEpisode(e.target.value);

        function renderSlide() {
            if (typeof slidesData === 'undefined' || !slidesData[currentSlide]) return;
            
            const slide = slidesData[currentSlide];
            elTitle.innerHTML = slide.title || '無題';
            elContent.innerHTML = slide.content || '';
            
            // Image handling with path correction
            const imagePath = slide.imageSrc ? (currentPath + slide.imageSrc) : "";
            if (imagePath) {
                elImg.src = imagePath;
                elImg.classList.remove('hidden');
                elImgDesc.classList.add('hidden');
                elImg.onerror = () => {
                    elImg.classList.add('hidden');
                    elImgDesc.classList.remove('hidden');
                    elImgDesc.innerText = "[画像未生成]\n" + (slide.imgDesc || '');
                };
            } else {
                elImg.classList.add('hidden');
                elImgDesc.classList.remove('hidden');
                elImgDesc.innerText = slide.imgDesc || '';
            }
            
            elScript.innerText = slide.script || '';
            
            // Progress Update
            const displayIndex = currentSlide + 1;
            const total = slidesData.length;
            elCounter.innerText = `${displayIndex} / ${total}`;
            elProgress.style.width = `${(displayIndex / total) * 100}%`;
            
            // Reset Scroll
            elPrompterBox.scrollTop = 0;

            // MathJax Rendering
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function nextSlide() {
            if (typeof slidesData !== 'undefined' && currentSlide < slidesData.length - 1) {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            }
        });

        // クリックナビゲーション (画面の右側クリックで進む、左側で戻る)
        document.querySelector('.slide-area').addEventListener('click', (e) => {
            const width = window.innerWidth;
            if (e.clientX > width * 0.4) {
                nextSlide();
            } else {
                prevSlide();
            }
        });

        // [NEW] フリック操作（スワイプ）の実装
        let touchstartX = 0;
        let touchendX = 0;
        
        const slideArea = document.querySelector('.slide-area');
        
        slideArea.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, false);
        
        slideArea.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);
        
        function handleSwipe() {
            const threshold = 50; 
            if (touchendX < touchstartX - threshold) {
                // 左にスワイプ -> 次へ
                nextSlide();
            }
            if (touchendX > touchstartX + threshold) {
                // 右にスワイプ -> 前へ
                prevSlide();
            }
        }

        window.onload = initEpisodeList;
    </script>
</body>
</html>
